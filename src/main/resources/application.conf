akka {
  actor {
    provider = "cluster"
    
    serialization-bindings {
      "com.akka.cluster.demo.CborSerializable" = jackson-cbor
    }
  }
  
  remote.artery {
    canonical {
      hostname = "127.0.0.1"
      port = 0  # Will be overridden by application
    }
  }
  
  cluster {
    seed-nodes = [
      "akka://ClusterSystem@127.0.0.1:2551"
    ]
    
    # Enable the split brain resolver
    downing-provider-class = "akka.cluster.sbr.SplitBrainResolverProvider"
    
    # Log cluster events for demonstration
    log-info = on
    log-info-verbose = off
    
    # Require both frontend and backend nodes before cluster becomes available
    min-nr-of-members = 2
    
    split-brain-resolver {
      # Use keep-majority strategy (works with 2 nodes)
      active-strategy = keep-majority
      
      # Time margin for stability
      stable-after = 7s
    }
    
    # Role-based member requirements
    role {
      frontend.min-nr-of-members = 1
      backend.min-nr-of-members = 1
    }
  }
  
  # HTTP configuration (for frontend node)
  http {
    server {
      request-timeout = 30s
      bind-timeout = 10s
      idle-timeout = 60s
    }
  }
  
  # Logging configuration
  loggers = ["akka.event.slf4j.Slf4jLogger"]
  loglevel = "INFO"
  logging-filter = "akka.event.slf4j.Slf4jLoggingFilter"
}

# Boston Bot specific configuration
boston-bot {
  # Web server configuration (frontend node)
  web {
    port = 8080
    interface = "0.0.0.0"
  }
  
  # Future: RAG configuration (backend node)
  rag {
    vector-db {
      # Qdrant configuration will go here
      host = "localhost"
      port = 6333
    }
    
    llm {
      # OpenAI configuration will go here
      provider = "openai"
      model = "gpt-3.5-turbo"
    }
  }
  
  # Cluster node configuration
  cluster {
    frontend-port = 2551
    backend-port = 2552
  }
}
